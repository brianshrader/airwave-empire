<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* Retro Desktop Styles */
        body {
            background-color: #008080; /* Classic Teal */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            color: black;
        }

        .window {
            background-color: #c0c0c0;
            border: 2px outset #ffffff;
            padding: 2px;
            width: 400px;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.5);
        }

        .title-bar {
            background-color: #000080;
            color: white;
            padding: 3px 5px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .content {
            padding: 20px;
        }

        /* The Scenario Icon */
        .scenario-icon {
            display: inline-block;
            text-align: center;
            width: 80px;
            cursor: pointer;
        }

        .icon-box {
            width: 40px;
            height: 40px;
            background: #fff;
            border: 2px inset #000;
            margin: 0 auto 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Bottom Taskbar */
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 35px;
            background-color: #c0c0c0;
            border-top: 2px outset #ffffff;
            display: flex;
            align-items: center;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .start-btn {
            border: 2px outset #ffffff;
            padding: 2px 10px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="window">
        <div class="title-bar">
            <span>Scenario Selector</span>
            <span>_ □ X</span>
        </div>
        <div class="content">
            <div class="scenario-icon">
                <div class="icon-box">📻</div>
                <div>Wichita '70</div>
            </div>
            
            <hr>
            
            <div style="border: 2px inset #808080; padding: 10px; background: white;">
                <strong>Status:</strong> Struggling Station<br>
                <strong>Funds:</strong> <span style="color: green;">$236,000</span><br>
                <strong>Dates:</strong> 1970 - 2020
            </div>
        </div>
    </div>

    <div class="taskbar">
        <div class="start-btn">Start</div>
        <div style="margin-left: 20px;">Autosave: Active</div>
    </div>

</body>
</html>
