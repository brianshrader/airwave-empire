<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Public radio simulation (dev)</title>
  <script>window.__WL_SHARE_INSPECT_ONLY = true;</script>
</head>
<body style="margin:0;background:#111;color:#ddd;font-family:system-ui,Segoe UI,sans-serif">
  <pre id="inspect-report" style="margin:0;padding:20px;white-space:pre-wrap;font-size:13px;line-height:1.5">Loading public-radio simulation… (can take 1–3 minutes with ?quick=1; longer without)</pre>
  <script defer src="/src/stationLogoConfig.js"></script>
  <script defer src="/src/stationLogoSvg.js"></script>
  <script defer src="/src/legacy.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var h = document.createElement('script');
      h.src = '/src/marketSimHarness.js';
      h.onload = function () {
        var b = document.createElement('script');
        b.src = '/src/inspectPublicRadioBoot.js';
        document.body.appendChild(b);
      };
      document.body.appendChild(h);
    });
  </script>
</body>
</html>
