<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market snowball trace (per-period diary)</title>
  <script>window.__WL_AI_BENCHMARK_PAGE__ = true;</script>
</head>
<body style="margin:0;background:#111;color:#ddd;font-family:system-ui,Segoe UI,sans-serif">
  <pre id="inspect-report" style="margin:0;padding:20px;white-space:pre-wrap;font-size:12px;line-height:1.45">Running snowball trace…</pre>
  <script defer src="/src/stationLogoConfig.js"></script>
  <script defer src="/src/stationLogoSvg.js"></script>
  <script defer src="/src/legacy.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var h = document.createElement('script');
      h.src = '/src/marketSimHarness.js';
      h.onload = function () {
        var sn = document.createElement('script');
        sn.src = '/src/marketSimHarnessSnowball.js';
        sn.onload = function () {
          var b = document.createElement('script');
          b.src = '/src/inspectMarketSnowballBoot.js';
          document.body.appendChild(b);
        };
        document.body.appendChild(sn);
      };
      document.body.appendChild(h);
    });
  </script>
</body>
</html>
